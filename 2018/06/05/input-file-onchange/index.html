></pre></td></tr></table></figure>

<h3 id="这是因为input的value值没有改变，需要我们手动清空一下-需要注意的是清空value需要在图片上传完成后再清空，不然会上传失败"><a href="#这是因为input的value值没有改变，需要我们手动清空一下-需要注意的是清空value需要在图片上传完成后再清空，不然会上传失败" class="headerlink" title="这是因为input的value值没有改变，需要我们手动清空一下,需要注意的是清空value需要在图片上传完成后再清空，不然会上传失败"></a>这是因为<code>input</code>的value值没有改变，需要我们手动清空一下,需要注意的是清空value需要在图片上传完成后再清空，不然会上传失败</h3><figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">this</span>.refs.fileUpload.value = <span class="literal">null</span></span><br></pre></td></tr></table></figure>
